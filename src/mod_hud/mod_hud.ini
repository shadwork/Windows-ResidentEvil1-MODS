# HUD Overlay Configuration
# Alignment: top-left, top-right, bottom-left, bottom-right
# dx, dy: offset from the aligned corner (in game pixels, 320x240 space)
# spacing: gap between inventory cells (in game pixels)
# slot_w, slot_h: size of each inventory cell (in game pixels)
# font_size: multiplier for 8x8 font (1 = normal, 2 = double, 4 = quadruple)
# enabled: 1 = show, 0 = hide

# Inventory panel
inv_enabled = 1
inv_align = top-left
inv_dx = 2
inv_dy = 2
inv_spacing_x = 20
inv_spacing_y = 20
inv_columns = 2
inv_slot_w = 16
inv_slot_h = 16
inv_font_size = 2
# Quantity text position relative to slot (top-left, top-right, bottom-left, bottom-right)
inv_text_align = bottom-left
inv_text_dx = 2
inv_text_dy = 2
# Border highlight on currently equipped weapon slot
# Quantity display: all = show for all items, weapon = only guns with ammo (not knife)
inv_quantity = weapon
inv_current_weapon_enable = 1
inv_current_weapon_color = ffff0000
inv_current_weapon_width = 1

# Health display (ECG chart)
health_enabled = 0
health_align = bottom-left
health_dx = 4
health_dy = 32
health_font_size = 2

# Equipped weapon display (below health)
weapon_enabled = 0
weapon_align = bottom-left
weapon_dx = 2
weapon_dy = 2
weapon_font_size = 2
weapon_text_align = bottom-left
weapon_text_dx = 2
weapon_text_dy = 2
